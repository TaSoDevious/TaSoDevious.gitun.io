<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1>Wild Neighbors</h1>
  <nav>
    <a href="index.html">Home</a><a href="predators.html">Lion & Wolf</a>
    <a href="elephants.html">Elephants</a><a href="sky-water.html">Eagles & Frogs</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <h2>Contact Me</h2>
  <p>Tell me which animal you want to learn more about. You can also <a href="mailto:monta@example.com">email me</a>.</p>

  <form action="#" onsubmit="alert('Thanks for your message!'); return false;">
    <label for="name">Your name</label>
    <input id="name" name="name" type="text" required>

    <p>Which animal do you like best?</p>
    <div class="choices">
      <label><input type="radio" name="favorite" value="lion" required> Lion</label>
      <label><input type="radio" name="favorite" value="elephant"> Elephant</label>
    </div>

    <p>What do you care about?</p>
    <div class="choices">
      <label><input type="checkbox" name="care" value="habitat"> Protecting habitats</label>
      <label><input type="checkbox" name="care" value="clean-water"> Clean water</label>
    </div>

    <label for="topic">Choose a topic</label>
    <select id="topic" name="topic">
      <option>Animal facts</option>
      <option>Conservation</option>
      <option>School project question</option>
    </select>

    <label for="message">Your message</label>
    <textarea id="message" rows="5"></textarea>
    <button class="button" type="submit">Send message</button>
  </form>
</main>
<footer>Wild Neighbors</footer>
</body>
</html>
